name: Build Radio Catalog

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 3 1 * *"  # 1 число каждого месяца UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------
      # DOWNLOAD
      # ----------------------------------------
      - name: Fetch stations (with fallback)
        run: |
          set -e

          URLS=(
            "https://all.api.radio-browser.info/json/stations?hidebroken=true&limit=100000&order=votes&reverse=true"
            "https://de1.api.radio-browser.info/json/stations?hidebroken=true&limit=100000&order=votes&reverse=true"
            "https://de2.api.radio-browser.info/json/stations?hidebroken=true&limit=100000&order=votes&reverse=true"
            "https://nl1.api.radio-browser.info/json/stations?hidebroken=true&limit=100000&order=votes&reverse=true"
          )

          for url in "${URLS[@]}"; do
            echo "Trying $url"

            if curl --compressed -f -L --retry 5 --retry-delay 2 --retry-all-errors --connect-timeout 5 --max-time 60 "$url" -o offline.json; then
              echo "Success from $url"
              exit 0
            fi

            echo "Failed: $url"
          done

          echo "All endpoints failed"
          exit 1
    
      # ----------------------------------------
      # VALIDATION
      # ----------------------------------------
      - name: Validate JSON (jq)
        run: |
          set -e
          jq empty offline.json

      - name: Validate JSON structure
        run: |
          set -e
          TYPE=$(jq -r 'type' offline.json)
          if [ "$TYPE" != "array" ]; then
            echo "Invalid JSON root: $TYPE"
            exit 1
          fi

      - name: Validate size
        run: |
          set -e
          SIZE=$(wc -c < offline.json)
          echo "Size: $SIZE"

          if [ "$SIZE" -lt 1000000 ]; then
            echo "Dataset too small"
            exit 1
          fi

      # ----------------------------------------
      # BUILD
      # ----------------------------------------
      - name: Build tool
        run: swift build -c release --product radiocatalog-builder

      - name: Generate catalogs
        run: |
          set -e
          .build/release/radiocatalog-builder offline.json stations

      - name: Zip results
        run: |
          set -e
          zip -q stations-small.zip stations-small.json
          zip -q stations-medium.zip stations-medium.json
          zip -q stations-large.zip stations-large.json

      # ----------------------------------------
      # VERSION
      # ----------------------------------------
      - name: Set date tag
        run: |
          echo "RELEASE_TAG=$(date +'%Y%m')" >> $GITHUB_ENV

      # ----------------------------------------
      # RELEASE: latest (always overwrite)
      # ----------------------------------------
      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: |
            stations-small.zip
            stations-medium.zip
            stations-large.zip
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------
      # RELEASE: YYYYMM (idempotent)
      # ----------------------------------------
      - name: Check if YYYYMM exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create YYYYMM release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: |
            stations-small.zip
            stations-medium.zip
            stations-large.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------
      # CLEANUP (correct month diff)
      # ----------------------------------------
      - name: Delete old YYYYMM releases (keep 12 months)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          current=$(date +%Y)
          current_month=$(date +%m)

          gh release list --limit 100 --json tagName -q '.[].tagName' | while read tag; do
            if [[ $tag =~ ^[0-9]{6}$ ]]; then

              year=${tag:0:4}
              month=${tag:4:2}

              diff=$(( (current - year) * 12 + (10#$current_month - 10#$month) ))

              if [ $diff -gt 12 ]; then
                echo "Deleting $tag (age $diff months)"
                gh release delete "$tag" -y
              fi
            fi
          done

